services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      # unix-сокеты uwsgi для класса труда
      - /var/lib/uwsgi:/var/lib/uwsgi
      # статика и медиа класса труда
      - /var/www/klasstrueda.ru:/var/www/klasstrueda.ru:ro
      # статика и медиа bogatyrevata.com
      - /var/www/bogatyrevata.com/public:/var/www/bogatyrevata.com/public:ro
      # ssl сертификаты
      - /var/www/certbot:/var/www/certbot:ro 
      # SSL сертификаты
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - books-network
      - aurea-network

networks:
  books-network:
    external: true
    name: books-network
  aurea-network:
    external: true
    name: aurea-network