server {
    listen 80;
    server_name books.bogatyrevata.com;

    # фронтенд — проксируем на контейнер books-frontend
    location / {
        proxy_pass http://books-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API — путь передаётся как есть, без обрезки префикса /api
    # /api/categories → FastAPI получает /api/categories (prefix="/api" в роутерах)
    location /api/ {
        proxy_pass http://books-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
