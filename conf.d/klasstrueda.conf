# Основной сайт klasstrueda.ru
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name klasstrueda.ru www.klasstrueda.ru;

    ssl_certificate /etc/letsencrypt/live/klasstrueda.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klasstrueda.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/klasstrueda.ru-access.log;
    error_log /var/log/nginx/klasstrueda.ru-error.log;

    client_max_body_size 10M;

    location / {
        uwsgi_pass unix:/var/lib/uwsgi/klasstrueda.ru.sock;
        include uwsgi_params;
    }

    location ^~ /static {
        alias /var/www/klasstrueda.ru/python/app/static;
        access_log off;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
        add_header Pragma public;
        add_header Cache-Control "public";
    }
}

# Dev-версия dev.klasstrueda.ru
server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name dev.klasstrueda.ru;

    ssl_certificate /etc/letsencrypt/live/klasstrueda.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klasstrueda.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/dev.klasstrueda.ru-access.log;
    error_log /var/log/nginx/dev.klasstrueda.ru-error.log;

    client_max_body_size 50M;

    location / {
        uwsgi_pass unix:/var/lib/uwsgi/dev.klasstrueda.ru.sock;
        include uwsgi_params;
    }

    location ^~ /static {
        alias /var/www/klasstrueda.ru/dev/app/static;
        access_log off;
        expires 30d;
        add_header Access-Control-Allow-Origin *;
        add_header Pragma public;
        add_header Cache-Control "public";
    }
}

# Редирект HTTP → HTTPS для klasstrueda.ru
server {
    listen 80;
    listen [::]:80;
    server_name klasstrueda.ru www.klasstrueda.ru;
    return 301 https://$host$request_uri;
}

# Редирект HTTP → HTTPS для dev.klasstrueda.ru
server {
    listen 80;
    listen [::]:80;
    server_name dev.klasstrueda.ru;
    return 301 https://$host$request_uri;
}
