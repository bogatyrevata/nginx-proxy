# HTTPS — основной блок
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name colors.bogatyrevata.com;

    ssl_certificate     /etc/letsencrypt/live/colors.bogatyrevata.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/colors.bogatyrevata.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/aurea-access.log;
    error_log  /var/log/nginx/aurea-error.log;

    # Лимит размера фото — с запасом для больших референсов
    client_max_body_size 20M;

    # Фронтенд
    location / {
        proxy_pass         http://aurea-frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API — /api/ проксируем на бэкенд
    location /api/ {
        proxy_pass         http://aurea-backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Таймаут увеличен — Claude API может думать до 30 секунд
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# HTTP — редирект на HTTPS, challenge-location остаётся для автопродления
server {
    listen 80;
    server_name colors.bogatyrevata.com;

    access_log /var/log/nginx/aurea-access.log;
    error_log  /var/log/nginx/aurea-error.log;

    # хранение challenge-файлов для certbot (нужно для renew)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}